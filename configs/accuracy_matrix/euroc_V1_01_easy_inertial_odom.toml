# accuracy matrix: EuRoC V1_01_easy inertial odom
[run]
verbosity = 0
max_frames = 0

[input]
type = "euroc"
path = "/mnt/data/EuRoC/VR1/vicon_room1/V1_01_easy/mav0"
use_imu = true

[odometry]
odometry_mode = "Inertial"
rectified_stereo_camera = false
async_sba = false

[output]
trajectory = "/mnt/data/accuracy_out/euroc_V1_01_easy_inertial_odom/traj_tum.txt"
pose_source = "odometry"
visualize = false
print_every = 0
timestamp_unit = "ns"

[eval]
ground_truth = "/mnt/data/EuRoC/VR1/vicon_room1/V1_01_easy/mav0/state_groundtruth_estimate0/data.csv"
gt_format = "euroc"
align = "se3"
report = "/mnt/data/accuracy_out/euroc_V1_01_easy_inertial_odom/eval.txt"
apply_gt_extrinsic = "auto"
rpe_distances = [8, 16, 32]
rpe_delta = 1
rpe_delta_unit = "s"
