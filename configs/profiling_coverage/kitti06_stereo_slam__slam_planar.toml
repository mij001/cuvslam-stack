# profiling-coverage variant: kitti06_stereo_slam__slam_planar
[run]
verbosity = 0
max_frames = 0

[input]
type = "image_folder"
root = "/mnt/data/dataset/sequences/06"

  [[input.cameras]]
  images = "image_2/*.png"

  [[input.cameras]]
  images = "image_3/*.png"

  [input.timestamps]
  mode = "file"
  path = "times.txt"
  unit = "s"

[odometry]
odometry_mode = "Multicamera"
multicam_mode = "Performance"
rectified_stereo_camera = true
async_sba = false

[slam]
planar_constraints = true
enabled = true
use_gpu = true
sync_mode = true
enable_reading_internals = true

[[rig.cameras]]
size = [1226, 370]
focal = [707.0912, 707.0912]
principal = [601.8873, 183.1104]

[[rig.cameras]]
size = [1226, 370]
focal = [707.0912, 707.0912]
principal = [601.8873, 183.1104]
  [rig.cameras.rig_from_camera]
  translation = [0.537904, 0.0, 0.0]

[output]
trajectory = "/mnt/data/profiling_coverage_out/kitti06_stereo_slam__slam_planar/traj_tum.txt"
pose_source = "slam"
visualize = false
print_every = 0
timestamp_unit = "s"

[eval]
ground_truth = "/mnt/data/KITTI/datasets/poses/06.txt"
gt_format = "kitti"
align = "se3"
report = "/mnt/data/profiling_coverage_out/kitti06_stereo_slam__slam_planar/eval.txt"
gt_fps = 10.0
rpe_distances = "kitti"
