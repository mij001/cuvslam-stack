# profiling-coverage variant: kitti03_stereo_odom__base
[run]
verbosity = 0
max_frames = 0

[input]
type = "image_folder"
root = "/mnt/data/dataset/sequences/03"

  [[input.cameras]]
  images = "image_2/*.png"

  [[input.cameras]]
  images = "image_3/*.png"

  [input.timestamps]
  mode = "file"
  path = "times.txt"
  unit = "s"

[odometry]
odometry_mode = "Multicamera"
multicam_mode = "Performance"
rectified_stereo_camera = true
async_sba = false

[[rig.cameras]]
size = [1242, 375]
focal = [721.5377, 721.5377]
principal = [609.5593, 172.854]

[[rig.cameras]]
size = [1242, 375]
focal = [721.5377, 721.5377]
principal = [609.5593, 172.854]
  [rig.cameras.rig_from_camera]
  translation = [0.532725, 0.0, 0.0]

[output]
trajectory = "/mnt/data/profiling_coverage_out/kitti03_stereo_odom__base/traj_tum.txt"
pose_source = "odometry"
visualize = false
print_every = 0
timestamp_unit = "s"

[eval]
ground_truth = "/mnt/data/KITTI/datasets/poses/03.txt"
gt_format = "kitti"
align = "se3"
report = "/mnt/data/profiling_coverage_out/kitti03_stereo_odom__base/eval.txt"
gt_fps = 10.0
rpe_distances = "kitti"
