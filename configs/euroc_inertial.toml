# EuRoC MAV stereo-inertial odometry (OdometryMode.Inertial).
# The euroc source reads cam0/cam1/imu0 sensor*.yaml and builds the rig + IMU
# calibration automatically, and interleaves IMU samples with stereo frames.

[run]
verbosity = 1

[input]
type = "euroc"
path = "../examples/euroc/dataset/mav0"
use_imu = true

[odometry]
odometry_mode = "Inertial"
rectified_stereo_camera = false      # EuRoC images are distorted (Brown/Fisheye)
async_sba = false
enable_final_landmarks_export = true

[output]
trajectory = "out/euroc_mh01_inertial_tum.txt"
timestamp_unit = "ns"
visualize = false

[eval]
ground_truth = "state_groundtruth_estimate0/data.csv"
gt_format = "euroc"
align = "se3"
apply_gt_extrinsic = "auto"
rpe_distances = [8, 16, 32]
report = "out/euroc_mh01_inertial_eval.txt"
rpe_delta = 1                      # TUM-style RPE over a 1-second delta (Sturm 2012 / evo_rpe), matches
rpe_delta_unit = "s"               # the paper TUM-VI "RMSE RPE over 1 second"; reported as m / deg RMSE
