# accuracy matrix: TUM fr3_cabinet RGBD slam
[run]
verbosity = 0
max_frames = 0

[input]
type = "tum"
path = "/mnt/data/TUM_RGBD/extracted/rgbd_dataset_freiburg3_cabinet"
max_time_diff = 0.02
max_gap = 0.5

[odometry]
odometry_mode = "RGBD"
async_sba = false

  [odometry.rgbd]
  depth_scale_factor = 5000.0
  depth_camera_id = 0

[slam]
enabled = true
use_gpu = true
sync_mode = true
enable_reading_internals = true

[[rig.cameras]]
size = [640, 480]
focal = [535.4, 539.2]
principal = [320.1, 247.6]
border_top = 20
border_bottom = 20
border_left = 10
border_right = 50

[output]
trajectory = "/mnt/data/accuracy_out/tum_fr3_cabinet_rgbd_slam/traj_tum.txt"
pose_source = "slam"
visualize = false
print_every = 0
timestamp_unit = "s"

[eval]
ground_truth = "/mnt/data/TUM_RGBD/extracted/rgbd_dataset_freiburg3_cabinet/groundtruth.txt"
gt_format = "tum"
align = "se3"
report = "/mnt/data/accuracy_out/tum_fr3_cabinet_rgbd_slam/eval.txt"
gt_time_unit = "s"
rpe_distances = [1, 2, 4]
rpe_delta = 1
rpe_delta_unit = "s"

[profiling]
nvbit = true
