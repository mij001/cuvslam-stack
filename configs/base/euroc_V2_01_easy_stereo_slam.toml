# accuracy matrix: EuRoC V2_01_easy stereo slam
[run]
verbosity = 0
max_frames = 0

[input]
type = "euroc"
path = "/mnt/data/EuRoC/VR2/vicon_room2/V2_01_easy/mav0"
use_imu = false

[odometry]
odometry_mode = "Multicamera"
rectified_stereo_camera = false
async_sba = false

[slam]
enabled = true
use_gpu = true
sync_mode = true
enable_reading_internals = true

[output]
trajectory = "/mnt/data/accuracy_out/euroc_V2_01_easy_stereo_slam/traj_tum.txt"
pose_source = "slam"
visualize = false
print_every = 0
timestamp_unit = "ns"

[eval]
ground_truth = "/mnt/data/EuRoC/VR2/vicon_room2/V2_01_easy/mav0/state_groundtruth_estimate0/data.csv"
gt_format = "euroc"
align = "se3"
report = "/mnt/data/accuracy_out/euroc_V2_01_easy_stereo_slam/eval.txt"
apply_gt_extrinsic = "auto"
rpe_distances = [8, 16, 32]
rpe_delta = 1
rpe_delta_unit = "s"
